services:
  - type: web
    name: investment-scout-web
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m src.web_server
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SENDGRID_API_KEY
        sync: false
      - key: RECIPIENT_EMAIL
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: TWELVE_DATA_API_KEY
        sync: false
      - key: NEWSAPI_KEY
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: NEWSLETTER_TIME
        value: "09:00"
      - key: TIMEZONE
        value: America/New_York
      - key: LOG_LEVEL
        value: INFO
      - key: MAX_TRADING_ALERTS_PER_DAY
        value: "3"
      - key: ACTIVE_STOCK_TTL
        value: "15"
      - key: WATCHLIST_STOCK_TTL
        value: "60"
      - key: DATABASE_URL
        fromDatabase:
          name: investment-scout-db
          property: connectionString
      - key: REDIS_URL
        fromDatabase:
          name: investment-scout-redis
          property: connectionString

  - type: worker
    name: investment-scout-worker
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m src.main
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SENDGRID_API_KEY
        sync: false
      - key: RECIPIENT_EMAIL
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: TWELVE_DATA_API_KEY
        sync: false
      - key: NEWSAPI_KEY
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: NEWSLETTER_TIME
        value: "09:00"
      - key: TIMEZONE
        value: America/New_York
      - key: LOG_LEVEL
        value: INFO
      - key: MAX_TRADING_ALERTS_PER_DAY
        value: "3"
      - key: ACTIVE_STOCK_TTL
        value: "15"
      - key: WATCHLIST_STOCK_TTL
        value: "60"
      - key: DATABASE_URL
        fromDatabase:
          name: investment-scout-db
          property: connectionString
      - key: REDIS_URL
        fromDatabase:
          name: investment-scout-redis
          property: connectionString

databases:
  - name: investment-scout-db
    databaseName: investment_scout
    plan: free
    region: oregon

  - name: investment-scout-redis
    plan: free
    region: oregon
